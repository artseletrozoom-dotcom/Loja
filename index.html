<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eletrozoom Arts & Personalizados</title>
    <style>
        :root { --primary: #e31e24; --green: #25d366; --bg: #f4f4f4; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .page { display: none; padding-bottom: 50px; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* Topo */
        .loja-topo { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .busca-box { position: relative; flex-grow: 1; margin: 0 15px; }
        .busca-box input { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .carrinho-topo { cursor: pointer; font-size: 1.5rem; position: relative; }
        #contagem-carrinho { background: var(--primary); color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.75rem; position: absolute; top: -5px; right: -10px; }
        .admin-btn { background: #333; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* Banner e Resumo Rápido */
        .banner-container { text-align: center; padding: 10px; }
        .resumo-vitrine { background: #fff; margin: 10px; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); font-weight: bold; font-size: 1.1rem; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Categorias */
        .secao-colecoes { padding: 20px 0; background: white; border-bottom: 1px solid #eee; }
        .colecoes-container { display: flex; overflow-x: auto; gap: 20px; padding: 0 20px; scrollbar-width: none; }
        .colecao-item { flex: 0 0 auto; text-align: center; cursor: pointer; width: 100px; }
        .bola { width: 95px; height: 95px; border-radius: 50%; background: white; margin: 0 auto 10px; border: 3px solid #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bola img { width: 100%; height: 100%; object-fit: cover; }

        /* Grid de Produtos */
        .produtos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 140px; object-fit: contain; }
        .card .preco { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin-top: 10px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-add { flex: 1; background: var(--dark); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add:hover { background: var(--primary); }

        /* Formulário */
        .input-box { margin-bottom: 15px; text-align: left; }
        .input-box label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .input-box input, .input-box select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .total-banner { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: 800; border-radius: 10px; margin: 20px 0; }
        .frete-info { color: #2e7d32; font-weight: bold; text-align: center; margin-bottom: 10px; display: none; }
        
        /* Botões de Pagamento */
        .payment-methods { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .btn-payment { flex: 1; min-width: 140px; padding: 15px; border-radius: 8px; border: 2px solid #ddd; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-payment:hover { border-color: var(--primary); background: #f0f0f0; }
        .btn-payment.active { border-color: var(--primary); background: var(--primary); color: white; }

        /* Painel Admin */
        .admin-panel { background: #f5f5f5; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .admin-panel h3 { margin-top: 0; color: #333; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .admin-table td { padding: 10px; border: 1px solid #ddd; }
        .admin-table input { width: 100%; padding: 5px; box-sizing: border-box; }
        .admin-table button { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-content { background-color: white; margin: 5% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; }
        .modal-header { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
    </style>
</head>
<body>

    <!-- PÁGINA VITRINE -->

                🛒 <span id="contagem-carrinho">0</span>
            </div>
            <button class="admin-btn" onclick="abrirAdmin()">⚙️ Admin</button>
        </header>

        <div class="banner-container">
            <img src="https://i.postimg.cc/Znc6cdYb/Banner-Eletrozoom-(1).jpg" style="width: 100%; border-radius: 10px; max-width: 95%;">
        </div>

        <div id="resumo-total-vitrine" class="resumo-vitrine">
            🛒 Subtotal: R$ <span id="val-subtotal-vitrine">0,00</span>
        </div>

        <section class="secao-colecoes">
            <div class="colecoes-container">
                <div class="colecao-item" onclick="filtrar('Caixa')">
                    <div class="bola"><img src="https://basikebrasil.com.br/cdn/shop/files/Design_sem_nome.png?v=1756999070&width=700"></div>
                    <span>Caixas</span>
                </div>
                <div class="colecao-item" onclick="filtrar('Fone')">

            </div>
        </section>

        <div id="vitrine" class="produtos-grid"></div>
    </div>

    <!-- PÁGINA CHECKOUT -->
    <div id="p-checkout" class="page">
        <div class="container">
            <button onclick="nav('p-vitrine')" style="margin-bottom:20px; border:none; background:#eee; padding:10px; border-radius:8px; cursor:pointer;">← Voltar</button>
            <h2>Dados de Entrega</h2>
            
            <div class="input-box"><label>Nome:</label><input type="text" id="f-nome"></div>
            <div class="input-box"><label>WhatsApp:</label><input type="tel" id="f-zap"></div>
            <div class="input-box"><label>Email:</label><input type="email" id="f-email"></div>
            <div class="input-box">
                <label>CEP:</label>
                <input type="text" id="f-cep" maxlength="8" onkeyup="if(this.value.length==8) buscarCep(this.value)">
            </div>
            
            <div id="info-frete" class="frete-info">🚚 Frete: R$ 25,00</div>

            <div class="input-box"><label>Rua/Avenida:</label><input type="text" id="f-rua"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-box" style="flex:1"><label>Quadra:</label><input type="text" id="f-quadra"></div>
                <div class="input-box" style="flex:1"><label>Lote:</label><input type="text" id="f-lote"></div>
            </div>
            <div class="input-box"><label>Bairro:</label><input type="text" id="f-bairro"></div>
            <div class="input-box"><label>Referência:</label><input type="text" id="f-ref"></div>

            <div id="total-display" class="total-banner">Total: R$ 0,00</div>

            <!-- MÉTODOS DE PAGAMENTO -->
            <h3>Escolha a forma de pagamento:</h3>
            <div class="payment-methods">
                <button class="btn-payment" onclick="selecionarPagamento('whatsapp')">
                    💬 WhatsApp
                </button>
                <button class="btn-payment" onclick="selecionarPagamento('mercadopago')">
                    💳 Mercado Pago
                </button>
                <button class="btn-payment" onclick="selecionarPagamento('pix')">
                    🔑 PIX
                </button>
            </div>

            <button class="btn-finish" onclick="finalizarPagamento()" style="background: var(--green); color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem;">FINALIZAR COMPRA</button>
        </div>
    </div>

    <!-- MODAL ADMIN -->
    <div id="adminModal" class="modal">

            <div id="loginAdmin" style="margin-bottom: 10px;">

            <div id="adminContent" style="display: none;">

            render(produtos);
        }

        function tratarPreco(preco) {
            if (!preco) return 0;
            let p = String(preco).replace('R$', '').replace(/\s/g, '').replace(',', '.');
            return parseFloat(p) || 0;
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            atualizarValores();
            window.scrollTo(0,0);
        }

        function render(lista) {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.nome}</h3>
                    <div class="preco">R$ ${tratarPreco(p.preco_atual).toFixed(2).replace('.', ',')}</div>
                    <button class="btn-add" onclick="addCarrinho(${p.id})">ADICIONAR 🛒</button>
                </div>
            `).join('');
        }

        function addCarrinho(id) {
            const prod = produtos.find(p => p.id === id);
            if(prod) {
                carrinho.push(JSON.parse(JSON.stringify(prod)));
                document.getElementById('contagem-carrinho').innerText = carrinho.length;
                
                const divSub = document.getElementById('resumo-total-vitrine');
                divSub.style.display = 'block';
                atualizarValores();
                
                alert(prod.nome + " adicionado ao carrinho!");
            }
        }

        function filtrar(termo) {
            if(termo.trim() === '') {
                render(produtos);
            } else {
                render(produtos.filter(p => p.nome.toLowerCase().includes(termo.toLowerCase())));
            }
        }

        function buscarCep(val) {
            const cep = val.replace(/\D/g, '');
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(r => r.json())
                .then(d => {
                    if(!d.erro) {
                        document.getElementById('f-rua').value = d.logradouro;
                        document.getElementById('f-bairro').value = d.bairro;
                        document.getElementById('info-frete').style.display = 'block';
                        atualizarValores();
                    }
                });
        }

        function atualizarValores() {
            let sub = 0;
            carrinho.forEach(i => sub += tratarPreco(i.preco_atual));
            
            document.getElementById('val-subtotal-vitrine').innerText = sub.toFixed(2).replace('.', ',');
            
            const total = sub > 0 ? sub + taxaEntrega : 0;
            document.getElementById('total-display').innerText = `Total: R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function selecionarPagamento(metodo) {
            metodoSelecionado = metodo;
            document.querySelectorAll('.btn-payment').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function finalizarPagamento() {
            const nome = document.getElementById('f-nome').value;
            const email = document.getElementById('f-email').value;
            const zap = document.getElementById('f-zap').value;

            if(!nome || carrinho.length === 0 || !metodoSelecionado) {
                alert("Preencha todos os dados e selecione um método de pagamento!");
                return;
            }

            if(metodoSelecionado === 'whatsapp') {
                enviarWhatsApp();
            } else if(metodoSelecionado === 'mercadopago') {
                alert("Mercado Pago: Será implementado em breve com seu token!");
            } else if(metodoSelecionado === 'pix') {
                alert("PIX: Será implementado em breve!");
            }
        }

        function enviarWhatsApp() {
            const nome = document.getElementById('f-nome').value;
            const email = document.getElementById('f-email').value;
            const zap = document.getElementById('f-zap').value;

            let produtosTexto = "";
            let subtotal = 0;
            
            carrinho.forEach(i => {
                let p = tratarPreco(i.preco_atual);
                subtotal += p;
                produtosTexto += `✅ *${i.nome}*%0A`;
                produtosTexto += `R$ ${p.toFixed(2).replace('.', ',')}%0A%0A`; 
            });

            const totalFinal = subtotal + taxaEntrega;

            const msg = `*🛍️ NOVO PEDIDO - ELETROZOOM*%0A%0A` +
                        `*👤 CLIENTE:* ${nome}%0A` +
                        `*📧 EMAIL:* ${email}%0A` +
                        `*📱 WHATSAPP:* ${zap}%0A` +
                        `*📍 ENDEREÇO:* ${document.getElementById('f-rua').value}%0A` +
                        `*🏠 QD/LT:* ${document.getElementById('f-quadra').value}/${document.getElementById('f-lote').value}%0A` +
                        `*🏙️ BAIRRO:* ${document.getElementById('f-bairro').value}%0A%0A` +
                        `*🛒 ITENS DO PEDIDO:*%0A${produtosTexto}` +
                        `*------------------------------*%0A` +
                        `*SUBTOTAL:* R$ ${subtotal.toFixed(2).replace('.', ',')}%0A` +
                        `*FRETE FIXO:* R$ 25,00%0A` +
                        `*💰 TOTAL: R$ ${totalFinal.toFixed(2).replace('.', ',')}*`;

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`);
            carrinho = [];
            document.getElementById('contagem-carrinho').innerText = 0;
            nav('p-vitrine');
        }

        // PAINEL ADMIN
        function abrirAdmin() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('loginAdmin').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('adminSenha').value = '';
        }

        function fecharAdmin() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('adminSenha').value = '';
        }

        function autenticarAdmin() {
            const senha = document.getElementById('adminSenha').value;
            if(senha === ADMIN_PASSWORD) {
                document.getElementById('loginAdmin').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                preencherTabelaAdmin();
            } else {
                alert("❌ Senha incorreta!");
                document.getElementById('adminSenha').value = '';
            }
        }

        function preencherTabelaAdmin() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = produtos.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td><input type="text" value="${p.nome}" id="nome-${p.id}" style="width: 100%;"></td>
                    <td><input type="number" value="${p.preco_atual}" id="preco-${p.id}" step="0.01" style="width: 100%;"></td>
                    <td><button onclick="removerProduto(${p.id})">❌ Remover</button></td>
                </tr>
            `).join('');
        }

        function salvarProdutos() {
            produtos.forEach(p => {
                const novoNome = document.getElementById(`nome-${p.id}`).value;
                const novoPreco = parseFloat(document.getElementById(`preco-${p.id}`).value);
                
                p.nome = novoNome;
                p.preco_atual = novoPreco;
            });

            localStorage.setItem('produtos', JSON.stringify(produtos));
            alert("✅ Produtos atualizados com sucesso!");
            render(produtos);
            fecharAdmin();
        }

        function removerProduto(id) {
            if(confirm("Tem certeza que deseja remover este produto?")) {
                produtos = produtos.filter(p => p.id !== id);
                preencherTabelaAdmin();
            }
        }

        // INICIALIZAR
        window.onload = () => {
            carregarProdutos();
        };

        // FECHAR MODAL AO CLICAR FORA
        window.onclick = function(event) {
            const modal = document.getElementById('adminModal');
            if(event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
